data:
  raw_path: "data/raw/financial_phrasebank.csv"
  processed_path: "data/processed/processed.csv"
  test_size: 0.2
  random_state: 42

preprocessing:
  max_features: 10000
  ngram_range: [1, 2]
  min_df: 2
  use_stopwords: true
  lemmatize: true

model:
  name: "logistic_regression"        # logistic_regression | svm | random_forest
  class_weight: "balanced"           # handles imbalanced classes (Negative=12.5%)
  cv_folds: 5
  random_state: 42

  logistic_regression:
    C: 1.0
    max_iter: 1000
    solver: "lbfgs"
    multi_class: "multinomial"

  svm:
    C: 1.0
    kernel: "linear"

  random_forest:
    n_estimators: 200
    max_depth: 10

paths:
  models_dir: "models/"
  results_dir: "analysis_results/"
  model_file: "models/sentiment_model.pkl"
  vectorizer_file: "models/tfidf_vectorizer.pkl"

backtest:
  ticker: "SPY"                      # proxy for "market mood" vs S&P500
  start_date: "2020-01-01"
  end_date: "2023-12-31"
  initial_capital: 10000
  position_size: 0.1                 # fraction of capital per trade
  transaction_cost: 0.001            # 10 bps
